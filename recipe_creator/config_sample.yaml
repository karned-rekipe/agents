    # model_name: claude-haiku-4-5         # plus rapide, moins cher
    # model_name: claude-opus-4-5          # meilleur, plus cher
    #
    # Pour un LLM local (LM Studio / Ollama) :
    # provider: openai
    # model_name: qwen/qwen3.5-9b:2
